{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 회원가입</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}"/>
</head>
<body>
    <div class="signup-box">
        <header>
            <div class="header-left">
                <img class="icon" src="{% static 'images/숙멋로고.svg' %}">
                <h2>회원가입하기</h2>
            </div>
            <a href="{% static 'login.html' %}" class="out-btn">
                <img src="{% static 'images/out.svg' %}">
            </a>
        </header>
        <form name="signup" method="post" onsubmit="return checkPassword();">
            {% csrf_token %}
            <section class="signup_section">
                <span>이름</span>
                <input name="first_name" type="text" placeholder="김사자" required autocomplete="off" />
            </section>
            <section class="signup_section">
                <span>아이디</span>
                <input name="username" type="text" placeholder="아이디를 입력해 주세요." required autocomplete="off" />
            </section>
            <section class="signup_section">
                <span>비밀번호</span>
                <input id="pw1" name="password1" type="password" placeholder="비밀번호를 입력해 주세요." required autocomplete="new-password" />
            </section>
            <section class="signup_section">
                <span>비밀번호 확인</span>
                <input id="pw2" name="password2" type="password" placeholder="비밀번호를 다시 입력해 주세요." required autocomplete="new-password" />
            </section>
            <button class="signup_btn" type="submit">회원가입하기</button>
        </form>
    </div>
    <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>

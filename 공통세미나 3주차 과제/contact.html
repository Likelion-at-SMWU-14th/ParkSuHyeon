<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 CONTACT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-wrapper">

        <!-- 뒤 카드 -->
        <div class="card-bg"></div>

        <!-- 앞 카드 -->
        <div class="card">

            <!--상단바-->
            <div class="window-bar">
                <img src="bar_btn.svg" alt="bar button" class="bar-btn">
            </div>

            <div class="contact-area">

                <div class="contact-header">
                    <div class="contact-header-left">
                        <img src="contact.svg" class="contact-icon">
                        <h2>CONTACT</h2>
                    </div>

                    <a href="profile.html" class="home-btn">
                        <img src="home.svg" alt="home">
                    </a>
                </div>

                <div class="contact-list">
                    <div class="contact-row">
                        <img src="email.svg" class="contact-img">
                        <span>your@email.com</span>
                    </div>

                    <div class="contact-row">
                        <img src="phone.svg" class="contact-img">
                        <span>010-1234-5678</span>
                    </div>

                    <div class="contact-row">
                        <a href="https://www.instagram.com/iunhyns_/" target="_blank">
                            <img src="insta.svg" class="contact-img">
                        </a>
                        <span>@iunhyns_</span>
                    </div>

                    <div class="contact-row">
                        <a href="https://github.com/unhyns" target="_blank">
                            <img src="github.svg" class="contact-img">
                        </a>
                        <span>github.com/unhyns</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
